services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      xpack.security.enrollment.enabled: false
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    environment:
      LS_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "5000:5000"
    volumes:
      - ./misc/docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
      - logstash
    networks:
      - elk

  es-import:
    image: curlimages/curl:8.4.0
    depends_on:
      - elasticsearch
    restart: on-failure
    volumes:
      - ./misc/kibana/sample-logs.jsonl:/sample-logs.jsonl:ro
    entrypoint:
      - /bin/sh
      - -ec
      - >
        set -x; until curl -fsS http://elasticsearch:9200 >/dev/null 2>&1; do sleep 2; done; if [ ! -f /sample-logs.jsonl ]; then echo "Sample file /sample-logs.jsonl not found; exiting."; exit 0; fi; awk '!/@timestamp": "@timestamp"/ && /\S/' /sample-logs.jsonl > /tmp/sample.clean.jsonl || true; if [ ! -s /tmp/sample.clean.jsonl ]; then echo "No valid lines found in /sample-logs.jsonl after cleaning; exiting."; exit 0; fi; awk -v idx="microcrm-logs-sample" '{print "{\"index\":{\"_index\":\"" idx "\"}}"; print $0}' /tmp/sample.clean.jsonl > /tmp/bulk.ndjson; echo "Uploading sample logs to index microcrm-logs-sample..."; curl -fsS -H "Content-Type: application/x-ndjson" -X POST "http://elasticsearch:9200/_bulk?refresh=true" --data-binary @/tmp/bulk.ndjson; echo "Sample logs imported into microcrm-logs-sample.";
    networks:
      - elk

  kibana-init:
    image: curlimages/curl:8.4.0
    depends_on:
      - kibana
    restart: on-failure
    volumes:
      - ./misc/kibana/export.ndjson:/export.ndjson:ro
    environment:
      KIBANA_URL: http://kibana:5601
    entrypoint:
      - /bin/sh
      - -ec
      - >
        set -x; until curl -fsS "$$KIBANA_URL/api/status" >/dev/null 2>&1; do sleep 2; done;
          echo "Importing /export.ndjson into Kibana $$KIBANA_URL";
          curl -fsS -X POST "$$KIBANA_URL/api/saved_objects/_import?overwrite=true" -H "kbn-xsrf: true" -F file=@/export.ndjson;
        echo "Import completed.";
    networks:
      - elk

networks:
  elk:
    driver: bridge

volumes:
  elasticsearch-data:

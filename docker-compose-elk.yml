services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: microcrm-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      xpack.security.enrollment.enabled: false
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: microcrm-logstash
    environment:
      LS_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - ./misc/docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5000:5000"
      - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: microcrm-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elk

  kibana-init:
    image: curlimages/curl:8.4.0
    container_name: microcrm-kibana-init
    depends_on:
      - kibana
    volumes:
      - ./misc/kibana/export.ndjson:/export.ndjson:ro
    environment:
      KIBANA_URL: http://kibana:5601
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      until curl -sSf ${KIBANA_URL}/api/status >/dev/null 2>&1; do sleep 2; done; echo "Kibana is up, importing saved objects..."; curl -sS -X POST "${KIBANA_URL}/api/saved_objects/_import?overwrite=true" -H "kbn-xsrf: true" -F file=@/export.ndjson || true;
    networks:
      - elk

networks:
  elk:
    driver: bridge

volumes:
  elasticsearch-data:

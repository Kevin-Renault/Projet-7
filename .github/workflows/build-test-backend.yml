name: Build Test Backend

on: [workflow_call]

jobs:
  build-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Set up Docker Buildx # Prépare l'outil Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry # Authentification au registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CI-ACTION-TOKEN }}
      - name: Build and run backend tests (docker-compose) # Build et test backend via docker-compose
        run: |
          docker compose -f "$JAVA_DIR/docker-compose.yml" up --build --abort-on-container-exit --exit-code-from app || docker compose -f "$JAVA_DIR/docker-compose.yml" logs
      - name: Upload backend test results # Sauvegarde les résultats de test backend
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: ${{ env.JAVA_DIR }}/build/test-results/test/*.xml

name: Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      ANGULAR_DIR: front
      JAVA_DIR: back
      RELEASE_VERSION: ''
      NPM_DIST_TAG: latest
      REPO_LOWER: ''
      GITHUB_PACKAGES_SCOPE: ''
      FRONTEND_PACKAGE_NAME: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --global semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/commit-analyzer @semantic-release/exec @semantic-release/release-notes-generator

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npx semantic-release

      - name: Prepare release metadata
        if: env.RELEASE_VERSION != ''

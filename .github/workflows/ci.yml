  
name: CI Modular # Nom du workflow affiché dans GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: # Déclencheurs du workflow
  push: # Sur chaque push
    branches: [ '**' ] # Toutes les branches
  pull_request: # Sur chaque pull request
    branches: [ '**' ] # Toutes les branches

jobs: # Définition des jobs (briques)
  setup: # Job d'initialisation, parent des autres jobs
    runs-on: ubuntu-latest # OS utilisé pour ce job
    steps:
      - name: Setup (meta)
        run: echo "Setup job completed. Each job installs its own toolchain."

  test-application:
      runs-on: ubuntu-latest
      needs: setup
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        # Réutilise les dépendances Gradle entre deux exécutions du workflow.
        - name: Set up Java with Gradle cache
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle
        # Réutilise le cache npm à partir du package-lock du frontend.
        - name: Set up Node.js with npm cache
          uses: actions/setup-node@v4
          with:
            node-version: '24'
            cache: npm
            cache-dependency-path: front/package-lock.json
        # Installe Google Chrome pour les tests Angular
        - name: Install Google Chrome
          run: |
            sudo apt-get update
            sudo apt-get install -y wget gnupg
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
        # Définit la variable d'environnement CHROME_BIN
        - name: Set CHROME_BIN env variable
          run: echo "CHROME_BIN=$(which google-chrome)" >> $GITHUB_ENV
        - name: Ensure run-tests.sh is executable
          run: chmod +x ./run-tests.sh
        - name: Run all tests (backend & frontend)
          run: ./run-tests.sh
        - name: Upload all JUnit test results
          uses: actions/upload-artifact@v4
          with:
            name: test-results-all
            path: test-results/*.xml
        - name: Upload coverage reports
          uses: actions/upload-artifact@v4
          with:
            name: coverage-reports
            path: |
              back/build/reports/jacoco/test/jacocoTestReport.xml
              front/coverage/**/lcov.info
            if-no-files-found: error

  sonar-analysis:
    runs-on: ubuntu-latest
    needs: test-application
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Make Gradle wrapper executable
        working-directory: back
        run: chmod +x ./gradlew
      - name: Compile backend classes
        working-directory: back
        run: ./gradlew compileJava testClasses
      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets['SONAR_TOKEN'] }}


  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: [test-application, sonar-analysis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Build and push backend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=back-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker buildx build \
            --cache-from type=gha,scope=back \
            --cache-to type=gha,mode=max,scope=back \
            --target back \
            --tag ghcr.io/$REPO:$TAG \
            --push \
            .

  validate-docker-backend:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull backend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=back-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
      - name: Validate backend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=back-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker run -d --name ci-back -p 8080:8080 \
            ghcr.io/$REPO:$TAG
          sleep 20
          curl -f http://localhost:8080/actuator/health || curl -f http://localhost:8080/
      - name: Cleanup backend validation
        if: always()
        run: |
          docker rm -f ci-back || true

  build-and-push-frontend:
    runs-on: ubuntu-latest
    needs: [test-application, sonar-analysis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Build and push frontend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=front-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker buildx build \
            --cache-from type=gha,scope=front \
            --cache-to type=gha,mode=max,scope=front \
            --target front \
            --tag ghcr.io/$REPO:$TAG \
            --push \
            .

  validate-docker-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull frontend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=front-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
      - name: Validate frontend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=front-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker run -d --name ci-front -p 80:80 ghcr.io/$REPO:$TAG
          sleep 15
          curl -f http://localhost
      - name: Cleanup frontend validation
        if: always()
        run: |
          docker rm -f ci-front || true
         
  merge-report:
    runs-on: ubuntu-latest
    needs: [validate-docker-backend, validate-docker-frontend]
    if: always()
    steps:
      # Récupère les rapports produits par le job de test pour générer un résumé lisible.
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results-all
          path: test-results
      - name: Show test-results content
        run: ls -l test-results/
      - name: Afficher le résumé lisible
        run: |
          echo "# Résumé des tests JUnit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/Report-summary.xml ]; then
            awk '/<!\[CDATA\[/, /\]\]>/ {if ($0 !~ /<!\[CDATA\[|\]\]>/) print}' test-results/Report-summary.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Aucun rapport global trouvé (Report-summary.xml)." >> "$GITHUB_STEP_SUMMARY"
          fi
          
  cleanup: # Job de nettoyage final
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cleanup (placeholder)
        run: echo "Cleanup runs after all validations and report merge."


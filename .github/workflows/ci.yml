  
name: CI Modular # Nom du workflow affiché dans GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: # Déclencheurs du workflow
  push: # Sur chaque push
    branches: [ '**' ] # Toutes les branches
  pull_request: # Sur chaque pull request
    branches: [ '**' ] # Toutes les branches

jobs: # Définition des jobs (briques)
  setup: # Job d'initialisation, parent des autres jobs
    runs-on: ubuntu-latest # OS utilisé pour ce job
    steps:
      - name: Setup (meta)
        run: echo "Setup job completed. Each job installs its own toolchain."

  test-application:
      runs-on: ubuntu-latest
      needs: setup
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        # Réutilise les dépendances Gradle entre deux exécutions du workflow.
        - name: Set up Java with Gradle cache
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle
        # Réutilise le cache npm à partir du package-lock du frontend.
        - name: Set up Node.js with npm cache
          uses: actions/setup-node@v4
          with:
            node-version: '24'
            cache: npm
            cache-dependency-path: front/package-lock.json
        - name: Ensure run-tests.sh is executable
          run: chmod +x ./run-tests.sh
        - name: Run all tests (backend & frontend)
          run: ./run-tests.sh
        - name: Upload all JUnit test results
          uses: actions/upload-artifact@v4
          with:
            name: test-results-all
            path: test-results/*.xml

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: test-application
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Set up Docker Buildx # Prépare l'outil Docker Buildx pour le build multi-plateforme
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry # Authentifie Docker auprès du registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      # Réutilise les couches Docker déjà construites pour accélérer les builds d'image.
      - name: Build and push Docker image # Build et pousse l'image Docker backend
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker buildx build \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            --tag ghcr.io/$REPO:$TAG \
            --push \
            "$JAVA_DIR"

  validate-docker-backend:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull backend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
          docker tag ghcr.io/$REPO:$TAG workshop-organizer
      # Vérifie que l'image publiée démarre réellement avec le compose backend.
      - name: Validate backend with docker-compose
        run: |
          cd "$JAVA_DIR"
          docker compose -f docker-compose.yml up -d
          sleep 60
          (curl -f http://localhost:8080/actuator/health || curl -f http://localhost:8080/) || (docker compose logs app && exit 1)
          docker compose down




  build-and-push-frontend:
    runs-on: ubuntu-latest # Utilise l'image Ubuntu pour le runner
    needs: test-application # Ce job dépend du job de test-application
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Set up Docker Buildx # Prépare l'outil Docker Buildx pour le build multi-plateforme
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry # Authentifie Docker auprès du registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io # Spécifie le registre
          username: ${{ github.actor }} # Utilise l'utilisateur GitHub
          password: ${{ secrets.ACTIONS_TOKEN }} # Utilise le token GitHub
      # Réutilise les couches Docker déjà construites pour accélérer les builds d'image.
      - name: Build and push Docker image # Build et pousse l'image Docker frontend
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker buildx build \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            --tag ghcr.io/$REPO:$TAG \
            --push \
            "$ANGULAR_DIR"
  
  validate-docker-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push-frontend    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull frontend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
          docker tag ghcr.io/$REPO:$TAG workshop-front
      # Vérifie que l'image publiée sert bien l'application via le compose frontend.
      - name: Validate frontend with docker-compose
        run: |
          cd "$ANGULAR_DIR"
          docker compose -f docker-compose.yml up -d
          sleep 60
          curl -f http://localhost || (docker compose logs front && exit 1)
          docker compose down
         
  merge-report:
    runs-on: ubuntu-latest
    needs: [validate-docker-backend, validate-docker-frontend]
    if: always()
    steps:
      # Récupère les rapports produits par le job de test pour générer un résumé lisible.
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results-all
          path: test-results
      - name: Show test-results content
        run: ls -l test-results/
      - name: Afficher le résumé lisible
        run: |
          echo "# Résumé des tests JUnit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/Report-summary.xml ]; then
            awk '/<!\[CDATA\[/, /\]\]>/ {if ($0 !~ /<!\[CDATA\[|\]\]>/) print}' test-results/Report-summary.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Aucun rapport global trouvé (Report-summary.xml)." >> "$GITHUB_STEP_SUMMARY"
          fi
          
  cleanup: # Job de nettoyage final
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cleanup (placeholder)
        run: echo "Cleanup runs after all validations and report merge."


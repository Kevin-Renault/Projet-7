  
name: CI Modular # Nom du workflow affiché dans GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: # Déclencheurs du workflow
  push: # Sur chaque push
    branches: [ '**' ] # Toutes les branches
  pull_request: # Sur chaque pull request
    branches: [ '**' ] # Toutes les branches

jobs: # Définition des jobs (briques)
  setup: # Job d'initialisation, parent des autres jobs
    runs-on: ubuntu-latest # OS utilisé pour ce job
    steps:
      - name: Setup (meta)
        run: echo "Setup job completed. Each job installs its own toolchain."

  test-application:
      runs-on: ubuntu-latest
      needs: setup
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        # Réutilise les dépendances Gradle entre deux exécutions du workflow.
        - name: Set up Java with Gradle cache
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle
        # Réutilise le cache npm à partir du package-lock du frontend.
        - name: Set up Node.js with npm cache
          uses: actions/setup-node@v4
          with:
            node-version: '24'
            cache: npm
            cache-dependency-path: front/package-lock.json
        # Installe Google Chrome pour les tests Angular
        - name: Install Google Chrome
          run: |
            sudo apt-get update
            sudo apt-get install -y wget gnupg
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
        # Définit la variable d'environnement CHROME_BIN
        - name: Set CHROME_BIN env variable
          run: echo "CHROME_BIN=$(which google-chrome)" >> $GITHUB_ENV
        - name: Ensure run-tests.sh is executable
          run: chmod +x ./run-tests.sh
        - name: Run all tests (backend & frontend)
          run: ./run-tests.sh
        - name: Upload all JUnit test results
          uses: actions/upload-artifact@v4
          with:
            name: test-results-all
            path: test-results/*.xml


  build-and-push-app:
    runs-on: ubuntu-latest
    needs: test-application
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Build and push Docker image (root Dockerfile)
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=app-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker buildx build \
            --cache-from type=gha,scope=app \
            --cache-to type=gha,mode=max,scope=app \
            --tag ghcr.io/$REPO:$TAG \
            --push \
            .

  validate-docker-app:
    runs-on: ubuntu-latest
    needs: build-and-push-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull app image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=app-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
          docker tag ghcr.io/$REPO:$TAG app-latest
      # Ajoute ici la validation de l'image selon ta logique (compose, tests, etc.)
      - name: Validate app with docker-compose
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 60
          curl -f http://localhost || (docker compose logs && exit 1)
          docker compose down
         
  merge-report:
    runs-on: ubuntu-latest
    needs: [validate-docker-app]
    if: always()
    steps:
      # Récupère les rapports produits par le job de test pour générer un résumé lisible.
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results-all
          path: test-results
      - name: Show test-results content
        run: ls -l test-results/
      - name: Afficher le résumé lisible
        run: |
          echo "# Résumé des tests JUnit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/Report-summary.xml ]; then
            awk '/<!\[CDATA\[/, /\]\]>/ {if ($0 !~ /<!\[CDATA\[|\]\]>/) print}' test-results/Report-summary.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Aucun rapport global trouvé (Report-summary.xml)." >> "$GITHUB_STEP_SUMMARY"
          fi
          
  cleanup: # Job de nettoyage final
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cleanup (placeholder)
        run: echo "Cleanup runs after all validations and report merge."


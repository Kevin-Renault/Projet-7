name: Check PR Source Branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    name: Validate source branch for PRs targeting main
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check source branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"

          if [[ "$SOURCE_BRANCH" == "dev" ]] || [[ "$SOURCE_BRANCH" == bugfix/* ]]; then
            echo "✅ Branch '$SOURCE_BRANCH' is allowed to merge into main."
          else
            echo "❌ Branch '$SOURCE_BRANCH' is NOT allowed to merge into main."
            echo "Only 'dev' or 'bugfix/*' branches can open pull requests targeting 'main'."
            exit 1
          fi

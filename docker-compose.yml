services:
  back:
    container_name: workshop-back
    image: ${BACKEND_IMAGE:-}
    build:
      context: .
      dockerfile: Dockerfile
      target: back
    environment:
      SPRING_PROFILES_ACTIVE: elk
      ELK_LOGSTASH_HOST: host.docker.internal
      ELK_LOGSTASH_PORT: 5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10

  front:
    container_name: workshop-front
    image: ${FRONTEND_IMAGE:-}
    build:
      context: .
      dockerfile: Dockerfile
      target: front
    ports:
      - "80:80"
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
